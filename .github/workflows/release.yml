name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build source archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          mkdir -p builds
          git archive --format=zip HEAD -o "builds/vulos-deliver_${VERSION}_source.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: builds/*
          generate_release_notes: true
